services:
  - type: web
    name: ipl-fantasy-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:push
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GOOGLE_APPS_SCRIPT_SYNC_SECRET
        sync: false
      - key: GOOGLE_APPS_SCRIPT_SYNC_URL
        sync: false

  - type: web
    name: ipl-fantasy-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
